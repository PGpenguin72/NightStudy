<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夜自習考勤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <aside id="left-panel">
      <div id="lp-top">
        <div id="room-label">夜自習教室</div>
        <div id="session-dot" title="Session 狀態"></div>
      </div>

      <div id="clock-card">
        <div id="date-line">—</div>
        <div id="time-line">--:--:--</div>
      </div>

      <div id="stats-row">
        <div class="scard">
          <span class="scard-label">應到</span>
          <span class="scard-num" id="s-expected">—</span>
          <span class="scard-unit">人</span>
        </div>
        <div class="scard">
          <span class="scard-label">實到</span>
          <span class="scard-num" id="s-present">—</span>
          <span class="scard-unit">人</span>
        </div>
        <div class="scard">
          <span class="scard-label">缺席</span>
          <span class="scard-num" id="s-absent">—</span>
          <span class="scard-unit">人</span>
        </div>
      </div>

      <div id="hint-bar">請感應卡片簽到</div>

      <div id="log-box">
        <div id="log-list"></div>
      </div>

      <div id="teacher-bar" class="hidden">
        🔑 管理模式｜點擊座位調整狀態
      </div>
    </aside>

    <main id="right-panel">
      <div id="grid-wrap">
        <div id="seat-grid"></div>
      </div>
    </main>

  </div>

  <div id="overlay" class="hidden">
    <div id="status-menu">
      <p id="menu-title"></p>
      <div id="menu-opts"></div>
      <button id="menu-cancel">取消</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
