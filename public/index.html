<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>夜自習考勤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- ══ 左側面板 ══════════════════════════════════════════ -->
  <aside id="panel">

    <div id="p-header">
      <h1 id="room-name">夜自習教室</h1>
      <div id="status-pill" class="offline">未開始</div>
    </div>

    <div id="p-clock">
      <div id="p-date">—</div>
      <div id="p-time">--:--:--</div>
    </div>

    <div id="p-stats">
      <div class="stat">
        <div class="stat-n" id="n-expected">—</div>
        <div class="stat-l">應到</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <div class="stat-n" id="n-present">—</div>
        <div class="stat-l">實到</div>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <div class="stat-n" id="n-absent">—</div>
        <div class="stat-l">缺席</div>
      </div>
    </div>

    <div id="p-hint">感應卡片以簽到</div>

    <div id="p-log">
      <div id="p-log-title">最新紀錄</div>
      <div id="p-log-list"></div>
    </div>

    <div id="p-teacher" class="hidden">
      <div id="teacher-label">🔑 管理模式｜點擊座位可調整狀態</div>
      <div id="teacher-btns">
        <button id="btn-refresh">⟳ 立即更新</button>
        <button id="btn-sync-teachers">☁ 同步教師名單</button>
      </div>
    </div>

  </aside>

  <!-- ══ 右側座位格 ════════════════════════════════════════ -->
  <main id="grid-area">
    <div id="seat-grid"></div>
  </main>

</div>

<!-- 狀態選單 -->
<div id="overlay" class="hidden">
  <div id="smenu">
    <div id="smenu-title"></div>
    <div id="smenu-opts"></div>
    <button id="smenu-cancel">取消</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
